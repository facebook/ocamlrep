buildscript.run = false

[['cfg(target_os = "linux")'.cxx_library]]
name = "linux"
srcs = ["c/linux.c"]
headers = ["c/*.h"]

[['cfg(target_os = "macos")'.cxx_library]]
name = "macos"
srcs = ["c/darwin.c"]
headers = ["c/*.h"]

[['cfg(target_os = "windows")'.cxx_library]]
name = "windows"
srcs = ["c/windows.c"]
headers = ["c/*.h"]
