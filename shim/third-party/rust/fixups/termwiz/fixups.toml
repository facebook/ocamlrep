# termwiz's `tmux_cc` and `hyperlink` modules use `pest_derive`
# (`#[derive(Parser)]` with `#[grammar = "..."]`) to generate a parser at
# compile time. The proc-macro reads the referenced `.pest` grammar files
# relative to CARGO_MANIFEST_DIR. Reindeer's `precise_srcs` detects
# `include!()` macros but not pest's `#[grammar = ...]` attribute, so the
# .pest files need to be declared explicitly. We also need
# CARGO_MANIFEST_DIR forwarded so pest_derive can resolve the relative
# paths. Only applies to termwiz >= 0.18 where the pest-based parsers
# were introduced.
['cfg(version = ">=0.18")']
extra_srcs = ["src/**/*.pest"]
cargo_env = ["CARGO_MANIFEST_DIR"]
